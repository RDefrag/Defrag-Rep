<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Stats Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏎️ F1 Stats Tracker</h1>
        <nav class="abas">
            <button onclick="mostrarSecao('calendario')" id="btn-calendario" class="btn-aba active">Calendário</button>
            <button onclick="mostrarSecao('pilotos')" id="btn-pilotos" class="btn-aba">Pilotos</button>
            <button onclick="mostrarSecao('equipes')" id="btn-equipes" class="btn-aba">Equipes</button>
        </nav>
    </header>

    <main>
        <!-- Seção Calendário -->
        <section id="calendario" class="secao-conteudo">
            <h2>Calendário 2026</h2>
            <div id="lista-corridas" class="grid-container">
                <p>Carregando calendário...</p>
            </div>
        </section>

        <!-- Seção Pilotos -->
        <section id="pilotos" class="secao-conteudo" style="display:none">
            <h2>Pilotos da Temporada</h2>
            <div id="lista-pilotos" class="grid-container"></div>
        </section>

        <!-- Seção Equipes -->
        <section id="equipes" class="secao-conteudo" style="display:none">
            <h2>Escuderias</h2>
            <div id="lista-equipes" class="grid-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
